<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" width="420" height="520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowG3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="arrowB3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2563EB"/>
    </marker>
    <marker id="arrowAm3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#D97706"/>
    </marker>
    <marker id="arrowP3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7C3AED"/>
    </marker>
    <filter id="sh3" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="520" rx="12" fill="#F8FAFC"/>
  <rect x="1" y="1" width="418" height="518" rx="12" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B">ViscosityController: Feedback Loop</text>

  <!-- ============ Input Metrics ============ -->
  <rect x="12" y="50" width="95" height="40" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="60" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Arrival Rate</text>
  <text x="60" y="84" text-anchor="middle" font-size="13" font-style="italic" fill="#2563EB">&#x03BB;</text>
  <line x1="107" y1="70" x2="148" y2="130" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowG3)"/>

  <rect x="12" y="96" width="95" height="40" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="60" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Queue Depth</text>
  <text x="60" y="130" text-anchor="middle" font-size="13" font-style="italic" fill="#2563EB">d</text>
  <line x1="107" y1="116" x2="148" y2="136" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowG3)"/>

  <rect x="12" y="142" width="95" height="40" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="60" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Latency</text>
  <text x="60" y="176" text-anchor="middle" font-size="13" font-style="italic" fill="#2563EB">&#x2113;</text>
  <line x1="107" y1="162" x2="148" y2="145" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowG3)"/>

  <rect x="12" y="188" width="95" height="40" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="60" y="206" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Error Rate</text>
  <text x="60" y="222" text-anchor="middle" font-size="13" font-style="italic" fill="#2563EB">e</text>
  <line x1="107" y1="208" x2="148" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowG3)"/>

  <!-- ============ FlowMetrics Box ============ -->
  <rect x="153" y="112" width="120" height="72" rx="10" fill="white" stroke="#2563EB" stroke-width="2" filter="url(#sh3)"/>
  <rect x="153" y="112" width="120" height="24" rx="10" fill="#2563EB"/>
  <rect x="153" y="128" width="120" height="8" fill="#2563EB"/>
  <text x="213" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="white">FlowMetrics</text>
  <text x="213" y="155" text-anchor="middle" font-size="11" fill="#475569">collects &amp; aggregates</text>
  <text x="213" y="170" text-anchor="middle" font-size="11" fill="#475569">runtime signals</text>
  <line x1="273" y1="148" x2="300" y2="148" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowG3)"/>

  <!-- ============ Computation Box ============ -->
  <rect x="305" y="90" width="105" height="110" rx="10" fill="white" stroke="#7C3AED" stroke-width="2" filter="url(#sh3)"/>
  <rect x="305" y="90" width="105" height="24" rx="10" fill="#7C3AED"/>
  <rect x="305" y="106" width="105" height="8" fill="#7C3AED"/>
  <text x="358" y="107" text-anchor="middle" font-size="11" font-weight="700" fill="white">COMPUTE</text>

  <!-- gamma_dot = lambda -->
  <text x="358" y="138" text-anchor="middle" font-size="12" fill="#334155" font-style="italic">&#x03B3;&#x0307; = &#x03BB;</text>
  <!-- tau = l . lambda + e -->
  <text x="358" y="156" text-anchor="middle" font-size="12" fill="#334155" font-style="italic">&#x03C4; = &#x2113; &#x22C5; &#x03BB; + e</text>
  <!-- eta_m = tau / gamma_dot -->
  <text x="358" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#7C3AED" font-style="italic">&#x03B7;<tspan font-size="9" dy="4">m</tspan><tspan dy="-4"> = </tspan><tspan>&#x03C4; / &#x03B3;&#x0307;</tspan></text>
  <text x="358" y="195" text-anchor="middle" font-size="9" fill="#94A3B8">measured viscosity</text>
  <line x1="358" y1="200" x2="358" y2="235" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowG3)"/>

  <!-- ============ Adjustment Policy ============ -->
  <rect x="278" y="240" width="160" height="64" rx="10" fill="white" stroke="#D97706" stroke-width="2" filter="url(#sh3)"/>
  <rect x="278" y="240" width="160" height="24" rx="10" fill="#D97706"/>
  <rect x="278" y="256" width="160" height="8" fill="#D97706"/>
  <text x="358" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="white">Adjustment Policy</text>
  <rect x="288" y="272" width="65" height="22" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="320" y="287" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">RESPONSIVE</text>
  <rect x="358" y="272" width="65" height="22" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="390" y="287" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">EFFICIENT</text>

  <line x1="438" y1="272" x2="475" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowAm3)"/>

  <!-- delta-eta label -->
  <rect x="478" y="300" width="48" height="26" rx="7" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="502" y="317" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E" font-style="italic">&#x0394;&#x03B7;</text>

  <!-- delta-eta to clamp -->
  <line x1="526" y1="313" x2="540" y2="340" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowG3)"/>

  <!-- clamp box -->
  <rect x="540" y="342" width="70" height="36" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="575" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">clamp</text>
  <text x="575" y="372" text-anchor="middle" font-size="10" fill="#94A3B8">(min, max)</text>

  <!-- clamp to Viscosity -->
  <line x1="575" y1="378" x2="575" y2="415" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrowB3)"/>

  <!-- ============ Viscosity Box ============ -->
  <rect x="490" y="418" width="170" height="90" rx="12" fill="white" stroke="#2563EB" stroke-width="2.5" filter="url(#sh3)"/>
  <rect x="490" y="418" width="170" height="26" rx="12" fill="#2563EB"/>
  <rect x="490" y="434" width="170" height="10" fill="#2563EB"/>
  <text x="575" y="437" text-anchor="middle" font-size="14" font-weight="700" fill="white">Viscosity</text>
  <text x="575" y="474" text-anchor="middle" font-size="34" font-weight="700" fill="#2563EB" font-style="italic">&#x03B7;</text>
  <text x="575" y="498" text-anchor="middle" font-size="11" fill="#64748B" font-style="italic">&#x03B7; in [0, 1]</text>

  <!-- thaw() -->
  <rect x="410" y="440" width="65" height="26" rx="6" fill="#DCFCE7" stroke="#059669" stroke-width="1.2"/>
  <text x="442" y="457" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">thaw()</text>
  <line x1="475" y1="453" x2="490" y2="453" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowG3)"/>

  <!-- Viscosity outputs -->
  <line x1="520" y1="508" x2="470" y2="508" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrowB3)"/>
  <rect x="405" y="495" width="65" height="26" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="437" y="512" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">batch_size</text>

  <line x1="575" y1="508" x2="575" y2="518" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="540" y="518" width="70" height="26" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="575" y="535" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">batch_timeout</text>

  <!-- Feedback arrow -->
  <path d="M490,468 Q310,500 275,175 Q255,150 275,140" stroke="#7C3AED" stroke-width="2" fill="none" stroke-dasharray="8,4" marker-end="url(#arrowP3)"/>
  <text x="340" y="455" text-anchor="middle" font-size="11" fill="#7C3AED" font-style="italic">feedback</text>

  <!-- ============ Newton's Law Callout ============ -->
  <rect x="375" y="44" width="210" height="40" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="480" y="68" text-anchor="middle" font-size="16" font-weight="700" fill="#7C3AED" font-style="italic">&#x03C4; = &#x03B7; &#x22C5; &#x03B3;&#x0307;</text>
  <text x="480" y="80" text-anchor="middle" font-size="9" fill="#7C3AED">Newton's Law of Viscosity</text>

  <!-- Connecting callout to compute box -->
  <line x1="425" y1="84" x2="405" y2="92" stroke="#7C3AED" stroke-width="1" stroke-dasharray="4,2"/>
</svg>