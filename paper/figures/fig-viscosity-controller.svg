<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2563EB"/>
    </marker>
    <marker id="aA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#D97706"/>
    </marker>
    <marker id="aP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7C3AED"/>
    </marker>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="280" rx="8" fill="#F8FAFC"/>
  <rect x="1" y="1" width="698" height="278" rx="8" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">ViscosityController: Feedback Loop</text>

  <!-- ============ Input Metrics (left, stacked) ============ -->
  <rect x="8" y="36" width="98" height="32" rx="5" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="57" y="50" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Arrival Rate</text>
  <text x="57" y="63" text-anchor="middle" font-size="11" font-style="italic" fill="#2563EB">&#x03BB;</text>

  <rect x="8" y="72" width="98" height="32" rx="5" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="57" y="86" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Queue Depth</text>
  <text x="57" y="99" text-anchor="middle" font-size="11" font-style="italic" fill="#2563EB">d</text>

  <rect x="8" y="108" width="98" height="32" rx="5" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="57" y="122" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Latency</text>
  <text x="57" y="135" text-anchor="middle" font-size="11" font-style="italic" fill="#2563EB">&#x2113;</text>

  <rect x="8" y="144" width="98" height="32" rx="5" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="57" y="158" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Error Rate</text>
  <text x="57" y="171" text-anchor="middle" font-size="11" font-style="italic" fill="#2563EB">e</text>

  <!-- Arrows from metrics to FlowMetrics -->
  <line x1="106" y1="52" x2="132" y2="95" stroke="#475569" stroke-width="1" marker-end="url(#aG)"/>
  <line x1="106" y1="88" x2="132" y2="100" stroke="#475569" stroke-width="1" marker-end="url(#aG)"/>
  <line x1="106" y1="124" x2="132" y2="107" stroke="#475569" stroke-width="1" marker-end="url(#aG)"/>
  <line x1="106" y1="160" x2="132" y2="112" stroke="#475569" stroke-width="1" marker-end="url(#aG)"/>

  <!-- ============ FlowMetrics ============ -->
  <rect x="134" y="78" width="110" height="50" rx="8" fill="white" stroke="#2563EB" stroke-width="2" filter="url(#sh)"/>
  <rect x="134" y="78" width="110" height="20" rx="8" fill="#2563EB"/>
  <rect x="134" y="92" width="110" height="6" fill="#2563EB"/>
  <text x="189" y="93" text-anchor="middle" font-size="10" font-weight="700" fill="white">FlowMetrics</text>
  <text x="189" y="112" text-anchor="middle" font-size="8" fill="#475569">collect &amp; aggregate</text>
  <line x1="244" y1="103" x2="278" y2="103" stroke="#475569" stroke-width="1.2" marker-end="url(#aG)"/>

  <!-- ============ COMPUTE ============ -->
  <rect x="280" y="38" width="140" height="130" rx="8" fill="white" stroke="#7C3AED" stroke-width="2" filter="url(#sh)"/>
  <rect x="280" y="38" width="140" height="20" rx="8" fill="#7C3AED"/>
  <rect x="280" y="52" width="140" height="6" fill="#7C3AED"/>
  <text x="350" y="54" text-anchor="middle" font-size="10" font-weight="700" fill="white">COMPUTE</text>

  <text x="350" y="76" text-anchor="middle" font-size="11" fill="#334155" font-style="italic">&#x03B3;&#x0307; = &#x03BB;</text>
  <line x1="296" y1="83" x2="404" y2="83" stroke="#E2E8F0" stroke-width="0.8"/>
  <text x="350" y="99" text-anchor="middle" font-size="11" fill="#334155" font-style="italic">&#x03C4; = &#x2113; &#x22C5; &#x03BB; + e</text>
  <line x1="296" y1="106" x2="404" y2="106" stroke="#E2E8F0" stroke-width="0.8"/>
  <text x="350" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#7C3AED" font-style="italic">&#x03B7;<tspan font-size="8" dy="2">m</tspan><tspan dy="-2"> = &#x03C4; / &#x03B3;&#x0307;</tspan></text>
  <text x="350" y="140" text-anchor="middle" font-size="7" fill="#94A3B8">measured viscosity</text>
  <!-- formula highlight box -->
  <rect x="290" y="112" width="120" height="20" rx="3" fill="#F5F3FF" stroke="#7C3AED" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- COMPUTE down to Policy -->
  <line x1="350" y1="168" x2="350" y2="184" stroke="#475569" stroke-width="1.2" marker-end="url(#aG)"/>

  <!-- ============ Adjustment Policy ============ -->
  <rect x="262" y="186" width="176" height="44" rx="8" fill="white" stroke="#D97706" stroke-width="2" filter="url(#sh)"/>
  <rect x="262" y="186" width="176" height="18" rx="8" fill="#D97706"/>
  <rect x="262" y="200" width="176" height="4" fill="#D97706"/>
  <text x="350" y="200" text-anchor="middle" font-size="9" font-weight="700" fill="white">Adjustment Policy</text>
  <rect x="270" y="209" width="66" height="16" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.6"/>
  <text x="303" y="221" text-anchor="middle" font-size="7.5" font-weight="600" fill="#92400E">RESPONSIVE</text>
  <rect x="344" y="209" width="66" height="16" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.6"/>
  <text x="377" y="221" text-anchor="middle" font-size="7.5" font-weight="600" fill="#92400E">EFFICIENT</text>

  <!-- Policy right to Δη -->
  <line x1="438" y1="208" x2="468" y2="208" stroke="#D97706" stroke-width="1.5" marker-end="url(#aA)"/>

  <!-- ============ Δη ============ -->
  <rect x="472" y="196" width="40" height="24" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="492" y="213" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E" font-style="italic">&#x0394;&#x03B7;</text>

  <!-- Δη right to clamp -->
  <line x1="512" y1="208" x2="540" y2="218" stroke="#475569" stroke-width="1" marker-end="url(#aG)"/>

  <!-- ============ clamp ============ -->
  <rect x="544" y="200" width="58" height="26" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="573" y="214" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">clamp</text>
  <text x="573" y="223" text-anchor="middle" font-size="7" fill="#94A3B8">(min, max)</text>

  <!-- clamp down to Viscosity -->
  <line x1="573" y1="226" x2="573" y2="238" stroke="#2563EB" stroke-width="1.5" marker-end="url(#aB)"/>

  <!-- ============ Viscosity (main box) ============ -->
  <rect x="510" y="240" width="170" height="34" rx="8" fill="white" stroke="#2563EB" stroke-width="2.5" filter="url(#sh)"/>
  <rect x="510" y="240" width="170" height="18" rx="8" fill="#2563EB"/>
  <rect x="510" y="254" width="170" height="4" fill="#2563EB"/>
  <text x="595" y="254" text-anchor="middle" font-size="11" font-weight="700" fill="white">Viscosity</text>
  <text x="575" y="270" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB" font-style="italic">&#x03B7;</text>
  <text x="625" y="270" text-anchor="middle" font-size="9" fill="#64748B" font-style="italic">&#x03B7; &#x2208; [0, 1]</text>

  <!-- Output labels left of Viscosity -->
  <rect x="440" y="242" width="42" height="14" rx="3" fill="#DCFCE7" stroke="#059669" stroke-width="0.8"/>
  <text x="461" y="253" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">thaw()</text>
  <line x1="482" y1="249" x2="510" y2="249" stroke="#059669" stroke-width="1" marker-end="url(#aG)"/>

  <rect x="440" y="258" width="50" height="14" rx="3" fill="#EFF6FF" stroke="#93C5FD" stroke-width="0.8"/>
  <text x="465" y="269" text-anchor="middle" font-size="7" font-weight="600" fill="#1E40AF">batch_size</text>
  <line x1="490" y1="265" x2="510" y2="265" stroke="#2563EB" stroke-width="1" marker-end="url(#aB)"/>

  <!-- ============ Feedback arrow ============ -->
  <path d="M510,270 L262,270 Q230,270 230,240 L230,128 Q230,108 244,103" stroke="#7C3AED" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#aP)"/>
  <rect x="340" y="274" width="60" height="6" rx="2" fill="#F8FAFC" stroke="none"/>
  <text x="370" y="279" text-anchor="middle" font-size="7.5" fill="#7C3AED" font-style="italic">feedback</text>

  <!-- ============ Newton's Law Callout (beside COMPUTE) ============ -->
  <rect x="432" y="42" width="148" height="38" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="506" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#7C3AED" font-style="italic">&#x03C4; = &#x03B7; &#x22C5; &#x03B3;&#x0307;</text>
  <text x="506" y="74" text-anchor="middle" font-size="8" fill="#7C3AED">Newton's Law of Viscosity</text>

  <line x1="432" y1="62" x2="420" y2="68" stroke="#7C3AED" stroke-width="0.8" stroke-dasharray="2,3"/>
</svg>