<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2563EB"/>
    </marker>
    <marker id="aA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#D97706"/>
    </marker>
    <marker id="aP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7C3AED"/>
    </marker>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" rx="10" fill="#F8FAFC"/>
  <rect x="1" y="1" width="898" height="338" rx="10" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">ViscosityController: Feedback Loop</text>

  <!-- ============ Input Metrics (left) ============ -->
  <rect x="10" y="42" width="110" height="38" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="65" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">Arrival Rate</text>
  <text x="65" y="73" text-anchor="middle" font-size="12" font-style="italic" fill="#2563EB">&#x03BB;</text>

  <rect x="10" y="84" width="110" height="38" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="65" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">Queue Depth</text>
  <text x="65" y="115" text-anchor="middle" font-size="12" font-style="italic" fill="#2563EB">d</text>

  <rect x="10" y="126" width="110" height="38" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="65" y="142" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">Latency</text>
  <text x="65" y="157" text-anchor="middle" font-size="12" font-style="italic" fill="#2563EB">&#x2113;</text>

  <rect x="10" y="168" width="110" height="38" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="65" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">Error Rate</text>
  <text x="65" y="199" text-anchor="middle" font-size="12" font-style="italic" fill="#2563EB">e</text>

  <!-- Arrows from metrics to FlowMetrics -->
  <line x1="120" y1="61" x2="150" y2="105" stroke="#475569" stroke-width="1.2" marker-end="url(#aG)"/>
  <line x1="120" y1="103" x2="150" y2="112" stroke="#475569" stroke-width="1.2" marker-end="url(#aG)"/>
  <line x1="120" y1="145" x2="150" y2="120" stroke="#475569" stroke-width="1.2" marker-end="url(#aG)"/>
  <line x1="120" y1="187" x2="150" y2="122" stroke="#475569" stroke-width="1.2" marker-end="url(#aG)"/>

  <!-- ============ FlowMetrics ============ -->
  <rect x="152" y="92" width="120" height="60" rx="10" fill="white" stroke="#2563EB" stroke-width="2" filter="url(#sh)"/>
  <rect x="152" y="92" width="120" height="22" rx="10" fill="#2563EB"/>
  <rect x="152" y="108" width="120" height="6" fill="#2563EB"/>
  <text x="212" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="white">FlowMetrics</text>
  <text x="212" y="128" text-anchor="middle" font-size="9" fill="#475569">collects &amp; aggregates</text>
  <text x="212" y="142" text-anchor="middle" font-size="9" fill="#475569">runtime signals</text>
  <line x1="272" y1="122" x2="310" y2="122" stroke="#475569" stroke-width="1.2" marker-end="url(#aG)"/>

  <!-- ============ COMPUTE ============ -->
  <rect x="315" y="70" width="130" height="100" rx="10" fill="white" stroke="#7C3AED" stroke-width="2" filter="url(#sh)"/>
  <rect x="315" y="70" width="130" height="22" rx="10" fill="#7C3AED"/>
  <rect x="315" y="86" width="130" height="6" fill="#7C3AED"/>
  <text x="380" y="87" text-anchor="middle" font-size="10" font-weight="700" fill="white">COMPUTE</text>
  <text x="380" y="110" text-anchor="middle" font-size="10" fill="#334155" font-style="italic">&#x03B3;&#x0307; = &#x03BB;</text>
  <text x="380" y="126" text-anchor="middle" font-size="10" fill="#334155" font-style="italic">&#x03C4; = &#x2113; &#x22C5; &#x03BB; + e</text>
  <text x="380" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED" font-style="italic">&#x03B7;<tspan font-size="7" dy="3">m</tspan><tspan dy="-3"> = &#x03C4; / &#x03B3;&#x0307;</tspan></text>
  <text x="380" y="162" text-anchor="middle" font-size="8" fill="#94A3B8">measured viscosity</text>
  <line x1="380" y1="170" x2="380" y2="190" stroke="#475569" stroke-width="1.2" marker-end="url(#aG)"/>

  <!-- ============ Adjustment Policy ============ -->
  <rect x="290" y="195" width="180" height="54" rx="10" fill="white" stroke="#D97706" stroke-width="2" filter="url(#sh)"/>
  <rect x="290" y="195" width="180" height="22" rx="10" fill="#D97706"/>
  <rect x="290" y="211" width="180" height="6" fill="#D97706"/>
  <text x="380" y="212" text-anchor="middle" font-size="10" font-weight="700" fill="white">Adjustment Policy</text>
  <rect x="298" y="225" width="72" height="18" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="334" y="237" text-anchor="middle" font-size="8" font-weight="600" fill="#92400E">RESPONSIVE</text>
  <rect x="376" y="225" width="72" height="18" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="412" y="237" text-anchor="middle" font-size="8" font-weight="600" fill="#92400E">EFFICIENT</text>

  <!-- Policy -> delta eta -->
  <line x1="470" y1="222" x2="510" y2="222" stroke="#D97706" stroke-width="1.5" marker-end="url(#aA)"/>

  <!-- delta-eta label -->
  <rect x="515" y="212" width="42" height="22" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="536" y="227" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E" font-style="italic">&#x0394;&#x03B7;</text>

  <!-- delta-eta to clamp -->
  <line x1="557" y1="223" x2="590" y2="240" stroke="#475569" stroke-width="1.2" marker-end="url(#aG)"/>

  <!-- clamp box -->
  <rect x="592" y="242" width="65" height="30" rx="7" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="624" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">clamp</text>
  <text x="624" y="268" text-anchor="middle" font-size="8" fill="#94A3B8">(min, max)</text>

  <!-- clamp to Viscosity -->
  <line x1="624" y1="272" x2="624" y2="290" stroke="#2563EB" stroke-width="1.5" marker-end="url(#aB)"/>

  <!-- ============ Viscosity Box ============ -->
  <rect x="545" y="293" width="158" height="40" rx="10" fill="white" stroke="#2563EB" stroke-width="2.5" filter="url(#sh)"/>
  <rect x="545" y="293" width="158" height="22" rx="10" fill="#2563EB"/>
  <rect x="545" y="309" width="158" height="6" fill="#2563EB"/>
  <text x="624" y="309" text-anchor="middle" font-size="12" font-weight="700" fill="white">Viscosity</text>
  <text x="606" y="328" text-anchor="middle" font-size="20" font-weight="700" fill="#2563EB" font-style="italic">&#x03B7;</text>
  <text x="648" y="328" text-anchor="middle" font-size="10" fill="#64748B" font-style="italic">&#x03B7; in [0, 1]</text>

  <!-- thaw / freeze -->
  <rect x="455" y="298" width="40" height="22" rx="5" fill="#DCFCE7" stroke="#059669" stroke-width="1"/>
  <text x="475" y="313" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">thaw()</text>
  <line x1="495" y1="309" x2="545" y2="309" stroke="#059669" stroke-width="1.5" marker-end="url(#aG)"/>

  <!-- Outputs -->
  <rect x="455" y="326" width="55" height="22" rx="5" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="483" y="341" text-anchor="middle" font-size="8" font-weight="600" fill="#1E40AF">batch_size</text>
  <line x1="510" y1="337" x2="545" y2="337" stroke="#2563EB" stroke-width="1" marker-end="url(#aB)"/>

  <!-- Feedback arrow -->
  <path d="M545,320 Q380,350 275,150 Q258,130 275,120" stroke="#7C3AED" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#aP)"/>
  <text x="340" y="265" text-anchor="middle" font-size="9" fill="#7C3AED" font-style="italic">feedback</text>

  <!-- ============ Newton's Law Callout (top right) ============ -->
  <rect x="660" y="42" width="220" height="42" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="770" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#7C3AED" font-style="italic">&#x03C4; = &#x03B7; &#x22C5; &#x03B3;&#x0307;</text>
  <text x="770" y="78" text-anchor="middle" font-size="9" fill="#7C3AED">Newton's Law of Viscosity</text>
  <line x1="700" y1="84" x2="680" y2="92" stroke="#7C3AED" stroke-width="0.8" stroke-dasharray="3,2"/>
</svg>