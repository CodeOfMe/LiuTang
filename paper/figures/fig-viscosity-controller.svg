<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" width="680" height="500" font-family="'STIXGeneral-Regular', 'Cambria Math', 'Latin Modern Math', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrowG2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="arrowB2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2563EB"/>
    </marker>
    <marker id="arrowAm2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#D97706"/>
    </marker>
    <marker id="arrowP2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7C3AED"/>
    </marker>
    <filter id="sh2" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="500" rx="10" fill="#F8FAFC"/>
  <rect x="1" y="1" width="678" height="498" rx="10" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">ViscosityController: Feedback Loop</text>

  <!-- ============ Input Metrics ============ -->
  <rect x="12" y="48" width="100" height="36" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="62" y="63" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">Arrival Rate</text>
  <text x="62" y="77" text-anchor="middle" font-size="11" font-style="italic" fill="#2563EB">&#x03BB;</text>
  <line x1="112" y1="66" x2="140" y2="125" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG2)"/>

  <rect x="12" y="90" width="100" height="36" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="62" y="105" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">Queue Depth</text>
  <text x="62" y="119" text-anchor="middle" font-size="11" font-style="italic" fill="#2563EB">d</text>
  <line x1="112" y1="108" x2="140" y2="132" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG2)"/>

  <rect x="12" y="132" width="100" height="36" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="62" y="147" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">Latency</text>
  <text x="62" y="161" text-anchor="middle" font-size="11" font-style="italic" fill="#2563EB">l</text>
  <line x1="112" y1="150" x2="140" y2="145" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG2)"/>

  <rect x="12" y="174" width="100" height="36" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="62" y="189" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">Error Rate</text>
  <text x="62" y="203" text-anchor="middle" font-size="11" font-style="italic" fill="#2563EB">e</text>
  <line x1="112" y1="192" x2="140" y2="150" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG2)"/>

  <!-- ============ FlowMetrics Box ============ -->
  <rect x="145" y="110" width="120" height="68" rx="10" fill="white" stroke="#2563EB" stroke-width="2" filter="url(#sh2)"/>
  <rect x="145" y="110" width="120" height="22" rx="10" fill="#2563EB"/>
  <rect x="145" y="126" width="120" height="6" fill="#2563EB"/>
  <text x="205" y="126" text-anchor="middle" font-size="11" font-weight="700" fill="white">FlowMetrics</text>
  <text x="205" y="149" text-anchor="middle" font-size="9" fill="#475569">collects &amp; aggregates</text>
  <text x="205" y="162" text-anchor="middle" font-size="9" fill="#475569">runtime signals</text>
  <line x1="265" y1="144" x2="295" y2="144" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG2)"/>

  <!-- ============ Computation Box ============ -->
  <rect x="300" y="85" width="130" height="98" rx="10" fill="white" stroke="#7C3AED" stroke-width="2" filter="url(#sh2)"/>
  <rect x="300" y="85" width="130" height="22" rx="10" fill="#7C3AED"/>
  <rect x="300" y="101" width="130" height="6" fill="#7C3AED"/>
  <text x="365" y="101" text-anchor="middle" font-size="10" font-weight="700" fill="white">COMPUTE</text>
  <!-- gamma_dot = lambda -->
  <text x="365" y="128" text-anchor="middle" font-size="10" fill="#334155" font-style="italic"><tspan>&#x03B3;</tspan><tspan dy="-5" font-size="7">&#x0307;</tspan><tspan dy="5"> = </tspan><tspan>&#x03BB;</tspan></text>
  <!-- tau = l * lambda + e -->
  <text x="365" y="146" text-anchor="middle" font-size="10" fill="#334155" font-style="italic">&#x03C4; = l &#x22C5; &#x03BB; + e</text>
  <!-- eta_m = tau / gamma_dot -->
  <text x="365" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED" font-style="italic"><tspan>&#x03B7;</tspan><tspan font-size="7" dy="3">m</tspan><tspan dy="-3"> = </tspan><tspan>&#x03C4;</tspan><tspan> / </tspan><tspan>&#x03B3;</tspan><tspan dy="-5" font-size="7">&#x0307;</tspan></text>
  <text x="365" y="180" text-anchor="middle" font-size="8" fill="#94A3B8">measured viscosity</text>
  <line x1="365" y1="183" x2="365" y2="213" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG2)"/>

  <!-- ============ Adjustment Policy ============ -->
  <rect x="278" y="218" width="175" height="58" rx="10" fill="white" stroke="#D97706" stroke-width="2" filter="url(#sh2)"/>
  <rect x="278" y="218" width="175" height="22" rx="10" fill="#D97706"/>
  <rect x="278" y="234" width="175" height="6" fill="#D97706"/>
  <text x="365" y="234" text-anchor="middle" font-size="10" font-weight="700" fill="white">Adjustment Policy</text>
  <rect x="288" y="248" width="72" height="18" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="324" y="260" text-anchor="middle" font-size="8" font-weight="600" fill="#92400E">RESPONSIVE</text>
  <rect x="366" y="248" width="72" height="18" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="402" y="260" text-anchor="middle" font-size="8" font-weight="600" fill="#92400E">EFFICIENT</text>

  <line x1="453" y1="247" x2="490" y2="247" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowAm2)"/>

  <!-- delta-eta label -->
  <rect x="495" y="237" width="40" height="22" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="515" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E" font-style="italic">&#x0394;&#x03B7;</text>

  <!-- delta-eta to clamp -->
  <line x1="535" y1="248" x2="555" y2="275" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG2)"/>

  <!-- clamp box -->
  <rect x="555" y="278" width="70" height="32" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="590" y="293" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">clamp</text>
  <text x="590" y="305" text-anchor="middle" font-size="9" fill="#94A3B8">(min, max)</text>

  <!-- clamp to Viscosity -->
  <line x1="590" y1="310" x2="590" y2="345" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrowB2)"/>

  <!-- ============ Viscosity Box ============ -->
  <rect x="510" y="350" width="155" height="130" rx="12" fill="white" stroke="#2563EB" stroke-width="2.5" filter="url(#sh2)"/>
  <rect x="510" y="350" width="155" height="24" rx="12" fill="#2563EB"/>
  <rect x="510" y="366" width="155" height="8" fill="#2563EB"/>
  <text x="587" y="368" text-anchor="middle" font-size="13" font-weight="700" fill="white">Viscosity</text>
  <text x="587" y="405" text-anchor="middle" font-size="30" font-weight="700" fill="#2563EB" font-style="italic">&#x03B7;</text>
  <text x="587" y="430" text-anchor="middle" font-size="10" fill="#64748B" font-style="italic">&#x03B7; &#x2208; [0, 1]</text>

  <!-- thaw() -->
  <rect x="445" y="370" width="55" height="24" rx="6" fill="#DCFCE7" stroke="#059669" stroke-width="1.2"/>
  <text x="472" y="386" text-anchor="middle" font-size="9" font-weight="700" fill="#059669">thaw()</text>
  <line x1="500" y1="382" x2="510" y2="382" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowG2)"/>

  <!-- freeze() -->
  <!-- freeze() removed - not needed for layout -->

  <!-- Viscosity outputs -->
  <line x1="540" y1="480" x2="500" y2="480" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrowB2)"/>
  <rect x="440" y="468" width="60" height="24" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="470" y="484" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">batch_size</text>

  <line x1="587" y1="480" x2="587" y2="492" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="550" y="474" width="75" height="24" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="587" y="490" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">batch_timeout</text>

  <!-- Feedback arrow -->
  <path d="M510,415 Q370,450 265,178 Q245,155 265,128" stroke="#7C3AED" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowP2)"/>
  <text x="360" y="440" text-anchor="middle" font-size="9" fill="#7C3AED" font-style="italic">feedback</text>

  <!-- ============ Newton's Law Callout ============ -->
  <rect x="395" y="42" width="200" height="34" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="495" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#7C3AED" font-style="italic">
    <tspan>&#x03C4; = &#x03B7; &#x22C5; </tspan><tspan>&#x03B3;</tspan><tspan dy="-5" font-size="9">&#x0307;</tspan>
  </text>
  <text x="495" y="73" text-anchor="middle" font-size="8" fill="#7C3AED">Newton's Law of Viscosity</text>

  <!-- Connecting callout to compute box -->
  <line x1="440" y1="76" x2="430" y2="85" stroke="#7C3AED" stroke-width="0.8" stroke-dasharray="3,2"/>
</svg>