<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2563EB"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#DC2626"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#D97706"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7C3AED"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="520" rx="12" fill="#F8FAFC"/>
  <rect x="1" y="1" width="758" height="518" rx="12" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B">ViscosityController: Feedback Loop</text>

  <!-- ============ Input Metrics ============ -->
  <!-- Arrival Rate -->
  <rect x="18" y="60" width="105" height="40" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="70" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Arrival Rate</text>
  <text x="70" y="93" text-anchor="middle" font-size="10" fill="#2563EB">λ</text>
  <line x1="123" y1="80" x2="153" y2="150" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <!-- Queue Depth -->
  <rect x="18" y="110" width="105" height="40" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="70" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Queue Depth</text>
  <text x="70" y="143" text-anchor="middle" font-size="10" fill="#2563EB">d</text>
  <line x1="123" y1="130" x2="153" y2="155" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <!-- Latency -->
  <rect x="18" y="160" width="105" height="40" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="70" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Latency</text>
  <text x="70" y="193" text-anchor="middle" font-size="10" fill="#2563EB">ℓ</text>
  <line x1="123" y1="180" x2="153" y2="170" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <!-- Backlog -->
  <rect x="18" y="210" width="105" height="40" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="70" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Backlog</text>
  <text x="70" y="243" text-anchor="middle" font-size="10" fill="#2563EB">b</text>
  <line x1="123" y1="230" x2="153" y2="185" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <!-- Error Rate -->
  <rect x="18" y="260" width="105" height="40" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="70" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Error Rate</text>
  <text x="70" y="293" text-anchor="middle" font-size="10" fill="#2563EB">e</text>
  <line x1="123" y1="280" x2="153" y2="200" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <!-- ============ FlowMetrics Box ============ -->
  <rect x="158" y="130" width="130" height="80" rx="10" fill="white" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <rect x="158" y="130" width="130" height="24" rx="10" fill="#2563EB"/>
  <rect x="158" y="148" width="130" height="6" fill="#2563EB"/>
  <text x="223" y="147" text-anchor="middle" font-size="11" font-weight="700" fill="white">FlowMetrics</text>
  <text x="223" y="175" text-anchor="middle" font-size="9" fill="#475569">collects &amp; aggregates</text>
  <text x="223" y="188" text-anchor="middle" font-size="9" fill="#475569">runtime signals</text>

  <!-- FlowMetrics → Computations -->
  <line x1="288" y1="170" x2="320" y2="170" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <!-- ============ Computation Box ============ -->
  <rect x="325" y="108" width="145" height="100" rx="10" fill="white" stroke="#7C3AED" stroke-width="2" filter="url(#shadow)"/>
  <rect x="325" y="108" width="145" height="24" rx="10" fill="#7C3AED"/>
  <rect x="325" y="126" width="145" height="6" fill="#7C3AED"/>
  <text x="397" y="125" text-anchor="middle" font-size="10" font-weight="700" fill="white">COMPUTE</text>
  <text x="397" y="152" text-anchor="middle" font-size="10" fill="#475569">γ̇ = λ</text>
  <text x="397" y="166" text-anchor="middle" font-size="10" fill="#475569">τ = ℓ · λ + e</text>
  <text x="397" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED">η_m = τ / γ̇</text>
  <text x="397" y="200" text-anchor="middle" font-size="8" fill="#94A3B8">measured viscosity</text>

  <!-- Computation → Adjustment Policy -->
  <line x1="397" y1="208" x2="397" y2="240" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <!-- ============ Adjustment Policy ============ -->
  <rect x="305" y="245" width="185" height="65" rx="10" fill="white" stroke="#D97706" stroke-width="2" filter="url(#shadow)"/>
  <rect x="305" y="245" width="185" height="24" rx="10" fill="#D97706"/>
  <rect x="305" y="263" width="185" height="6" fill="#D97706"/>
  <text x="397" y="262" text-anchor="middle" font-size="10" font-weight="700" fill="white">Adjustment Policy</text>
  <!-- Policy modes -->
  <rect x="315" y="278" width="78" height="22" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="354" y="293" text-anchor="middle" font-size="8" font-weight="600" fill="#92400E">RESPONSIVE</text>
  <rect x="400" y="278" width="80" height="22" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="440" y="293" text-anchor="middle" font-size="8" font-weight="600" fill="#92400E">EFFICIENT</text>
  <rect x="315" y="298" width="78" height="18" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="354" y="310" text-anchor="middle" font-size="8" font-weight="500" fill="#92400E">BALANCED</text>
  <rect x="400" y="298" width="80" height="18" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="440" y="310" text-anchor="middle" font-size="8" font-weight="500" fill="#92400E">MANUAL</text>

  <!-- Policy → Δη -->
  <line x1="490" y1="277" x2="530" y2="277" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- Δη label -->
  <rect x="535" y="267" width="45" height="24" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="557" y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">Δη</text>

  <!-- Δη → clamp() → Viscosity -->
  <line x1="580" y1="279" x2="600" y2="279" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <!-- clamp box -->
  <rect x="605" y="258" width="75" height="42" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="642" y="276" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">clamp</text>
  <text x="642" y="292" text-anchor="middle" font-size="9" fill="#94A3B8">(min, max)</text>

  <!-- clamp → Viscosity -->
  <line x1="680" y1="279" x2="680" y2="350" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- ============ Viscosity Box ============ -->
  <rect x="600" y="355" width="140" height="140" rx="12" fill="white" stroke="#2563EB" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="600" y="355" width="140" height="28" rx="12" fill="#2563EB"/>
  <rect x="600" y="373" width="140" height="10" fill="#2563EB"/>
  <text x="670" y="375" text-anchor="middle" font-size="13" font-weight="700" fill="white">Viscosity</text>
  <text x="670" y="375" text-anchor="middle" font-size="13" font-weight="700" fill="white">Viscosity η</text>
  <!-- η value display -->
  <text x="670" y="415" text-anchor="middle" font-size="28" font-weight="700" fill="#2563EB">η</text>
  <text x="670" y="438" text-anchor="middle" font-size="10" fill="#64748B">η ∈ [0, 1]</text>

  <!-- thaw() and freeze() arrows -->
  <!-- thaw on left of viscosity -->
  <rect x="520" y="370" width="65" height="30" rx="6" fill="#DCFCE7" stroke="#059669" stroke-width="1.2"/>
  <text x="552" y="389" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">thaw()</text>
  <line x1="585" y1="385" x2="600" y2="400" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <!-- small arrow back -->
  <path d="M600,390 Q590,380 585,385" stroke="#059669" stroke-width="1" fill="none" stroke-dasharray="3,2"/>

  <!-- freeze on right of viscosity -->
  <rect x="750" y="370" width="65" height="30" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.2"/>
  <text x="782" y="389" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">freeze()</text>
  <line x1="740" y1="400" x2="750" y2="385" stroke="#DC2626" stroke-width="1.5"/>
  <path d="M740,390 Q745,377 750,385" stroke="#DC2626" stroke-width="1" fill="none"/>
  <!-- Bidirectional between thaw/freeze and Viscosity - already shown above -->

  <!-- Viscosity outputs -->
  <line x1="630" y1="495" x2="580" y2="495" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <rect x="485" y="482" width="95" height="28" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="532" y="500" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">batch_size</text>

  <line x1="710" y1="495" x2="755" y2="495" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="755" y="482" width="110" height="28" rx="6" fill="none" stroke="#93C5FD" stroke-width="0"/>

  <!-- Feedback arrow from Viscosity back to FlowMetrics -->
  <path d="M600,420 Q460,450 288,310 Q230,290 223,210" stroke="#7C3AED" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <text x="440" y="458" text-anchor="middle" font-size="9" fill="#7C3AED" font-style="italic">feedback</text>

  <!-- ============ Newton's Law Callout ============ -->
  <rect x="450" y="60" width="240" height="40" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="570" y="84" text-anchor="middle" font-size="14" font-weight="700" fill="#7C3AED" font-style="italic">τ = η · γ̇</text>
  <text x="570" y="96" text-anchor="middle" font-size="8" fill="#7C3AED">Newton's Law of Viscosity</text>

  <!-- Connecting callout to compute box -->
  <line x1="500" y1="100" x2="470" y2="108" stroke="#7C3AED" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- batch_timeout output -->
  <line x1="670" y1="495" x2="670" y2="510" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="618" y="506" width="105" height="28" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="670" y="524" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">batch_timeout</text>
</svg>