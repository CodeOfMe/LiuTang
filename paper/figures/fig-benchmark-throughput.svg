<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420" width="620" height="420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="grad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="grad5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="grad6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="620" height="420" rx="12" fill="#F8FAFC"/>
  <rect x="1" y="1" width="618" height="418" rx="12" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="310" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">Throughput Benchmark</text>
  <text x="310" y="46" text-anchor="middle" font-size="11" fill="#64748B">records/sec (thousands)</text>

  <!-- Y-axis -->
  <line x1="100" y1="60" x2="100" y2="350" stroke="#CBD5E1" stroke-width="1"/>
  <!-- Y-axis labels -->
  <text x="90" y="355" text-anchor="end" font-size="10" fill="#94A3B8">0</text>
  <line x1="97" y1="350" x2="580" y2="350" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="90" y="298" text-anchor="end" font-size="10" fill="#94A3B8">50</text>
  <line x1="97" y1="293" x2="580" y2="293" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="90" y="240" text-anchor="end" font-size="10" fill="#94A3B8">100</text>
  <line x1="97" y1="236" x2="580" y2="236" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="90" y="183" text-anchor="end" font-size="10" fill="#94A3B8">150</text>
  <line x1="97" y1="178" x2="580" y2="178" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="90" y="125" text-anchor="end" font-size="10" fill="#94A3B8">200</text>
  <line x1="97" y1="121" x2="580" y2="121" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="90" y="68" text-anchor="end" font-size="10" fill="#94A3B8">250</text>
  <line x1="97" y1="64" x2="580" y2="64" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Y-axis label -->
  <text x="25" y="205" text-anchor="middle" font-size="11" fill="#64748B" transform="rotate(-90 25 205)">Throughput (k rec/s)</text>

  <!-- X-axis -->
  <line x1="100" y1="350" x2="580" y2="350" stroke="#CBD5E1" stroke-width="1"/>

  <!-- Scale: 0=350, 250=60 → 1 k = (350-60)/250 = 1.16 px -->

  <!-- Bar 1: map - 230k rec/s -->
  <rect x="118" y="82" width="58" height="268" rx="4" fill="url(#grad1)" filter="url(#shadow)"/>
  <text x="147" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">230k</text>
  <text x="147" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">map</text>

  <!-- Bar 2: filter - 210k rec/s -->
  <rect x="196" y="106" width="58" height="244" rx="4" fill="url(#grad2)" filter="url(#shadow)"/>
  <text x="225" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">210k</text>
  <text x="225" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">filter</text>

  <!-- Bar 3: flat_map - 180k rec/s -->
  <rect x="274" y="141" width="58" height="209" rx="4" fill="url(#grad3)" filter="url(#shadow)"/>
  <text x="303" y="134" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">180k</text>
  <text x="303" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">flat_map</text>

  <!-- Bar 4: key_by+sum - 150k rec/s -->
  <rect x="352" y="176" width="58" height="174" rx="4" fill="url(#grad4)" filter="url(#shadow)"/>
  <text x="381" y="169" text-anchor="middle" font-size="11" font-weight="700" fill="#6D28D9">150k</text>
  <text x="381" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">key_by</text>
  <text x="381" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">+sum</text>

  <!-- Bar 5: window_tumbling - 95k rec/s -->
  <rect x="430" y="240" width="58" height="110" rx="4" fill="url(#grad5)" filter="url(#shadow)"/>
  <text x="459" y="233" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">95k</text>
  <text x="459" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">window</text>
  <text x="459" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">_tumbling</text>

  <!-- Bar 6: key_by+count - 120k rec/s -->
  <rect x="508" y="212" width="58" height="138" rx="4" fill="url(#grad6)" filter="url(#shadow)"/>
  <text x="537" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#0891B2">120k</text>
  <text x="537" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">key_by</text>
  <text x="537" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">+count</text>

  <!-- Footnote -->
  <text x="310" y="408" text-anchor="middle" font-size="9" fill="#94A3B8">Benchmark: LiuTang v1.0 | Python 3.12 | Apple M2 | single-threaded | batch_size=1</text>
</svg>