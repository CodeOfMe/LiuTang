<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520" width="500" height="520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="520" rx="12" fill="#F8FAFC"/>
  <rect x="1" y="1" width="498" height="518" rx="12" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="250" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">Feature Comparison</text>

  <!-- Radar chart center -->
  <!-- Center at (250, 260), radius 160 -->
  <!-- 5 axes at -90°, -18°, 54°, 126°, 198° (72° apart, starting from top) -->

  <!-- Grid circles -->
  <g stroke="#E2E8F0" stroke-width="0.5" fill="none">
    <circle cx="250" cy="260" r="32"/>
    <circle cx="250" cy="260" r="64"/>
    <circle cx="250" cy="260" r="96"/>
    <circle cx="250" cy="260" r="128"/>
    <circle cx="250" cy="260" r="160"/>
  </g>

  <!-- Axis lines -->
  <g stroke="#CBD5E1" stroke-width="0.8">
    <line x1="250" y1="260" x2="250" y2="100"/>
    <line x1="250" y1="260" x2="402.2" y2="210.6"/>
    <line x1="250" y1="260" x2="344.1" y2="388.8"/>
    <line x1="250" y1="260" x2="155.9" y2="388.8"/>
    <line x1="250" y1="260" x2="97.8" y2="210.6"/>
  </g>

  <!-- Grid labels -->
  <g font-size="8" fill="#94A3B8" text-anchor="start">
    <text x="255" y="228">1</text>
    <text x="255" y="196">2</text>
    <text x="255" y="164">3</text>
    <text x="255" y="132">4</text>
    <text x="255" y="100">5</text>
  </g>

  <!-- Axis endpoint coords (r=160):
    Top (0°/up):    (250, 100)
    Top-right (72°): (250+160*sin72, 260-160*cos72) = (250+152.2, 260-49.4) = (402.2, 210.6)
    Bot-right(144°):(250+160*sin144, 260-160*cos144) = (250+94.1, 260+129.4) = (344.1, 389.4) adjusted to 388.8
    Bot-left (216°): (250+160*sin216, 260-160*cos216) = (250-94.1, 260+129.4) = (155.9, 389.4) adjusted
    Top-left (288°):(250+160*sin288, 260-160*cos288) = (250-152.2, 260-49.4) = (97.8, 210.6)
  -->

  <!-- Axis labels -->
  <text x="250" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Zero-Dependency</text>
  <text x="414" y="205" text-anchor="start" font-size="11" font-weight="600" fill="#1E293B">Event-Time</text>
  <text x="356" y="404" text-anchor="start" font-size="11" font-weight="600" fill="#1E293B">Windowing</text>
  <text x="144" y="404" text-anchor="end" font-size="11" font-weight="600" fill="#1E293B">State Mgmt</text>
  <text x="86" y="205" text-anchor="end" font-size="11" font-weight="600" fill="#1E293B">Delivery</text>
  <text x="86" y="218" text-anchor="end" font-size="11" font-weight="600" fill="#1E293B">Semantics</text>

  <!-- PyFlink area (red) - scores 1,5,5,5,5 -->
  <!-- Point coords at r=score*32:
    0°: 1→(250, 228)
    72°: 5→(250+160*0.951, 260-160*0.309)=(402.2, 210.6)
    144°:5→(344.1, 389.4)
    216°:5→(155.9, 389.4)
    288°:5→(97.8, 210.6)
  -->
  <polygon points="250,228 402.2,210.6 344.1,389 155.9,389 97.8,210.6"
    fill="#DC2626" fill-opacity="0.12" stroke="#DC2626" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Bytewax area (green) - scores 4,4,3,3,2 -->
  <!--
    0°: 4→(250, 132)
    72°: 4→(250+128*sin72, 260-128*cos72)=(250+121.7, 260-39.5)=(371.7, 220.5)
    144°:3→(250+96*sin144, 260-96*cos144)=(250+56.5, 260+77.6)=(306.5, 337.6)
    216°:3→(250-56.5, 260+77.6)=(193.5, 337.6)
    288°:2→(250+64*sin288, 260-64*cos288)=(250-60.9, 260-19.8)=(189.1, 240.2)
  -->
  <polygon points="250,132 371.7,220.5 306.5,337.6 193.5,337.6 189.1,240.2"
    fill="#059669" fill-opacity="0.12" stroke="#059669" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- LiuTang area (blue) - scores 5,4,5,5,5 -->
  <!--
    0°: 5→(250, 100)
    72°: 4→(371.7, 220.5)
    144°:5→(344.1, 389)
    216°:5→(155.9, 389)
    288°:5→(97.8, 210.6)
  -->
  <polygon points="250,100 371.7,220.5 344.1,389 155.9,389 97.8,210.6"
    fill="#2563EB" fill-opacity="0.15" stroke="#2563EB" stroke-width="2" stroke-opacity="0.8"/>

  <!-- Data points - LiuTang -->
  <g fill="#2563EB">
    <circle cx="250" cy="100" r="4"/>
    <circle cx="371.7" cy="220.5" r="4"/>
    <circle cx="344.1" cy="389" r="4"/>
    <circle cx="155.9" cy="389" r="4"/>
    <circle cx="97.8" cy="210.6" r="4"/>
  </g>

  <!-- Data points - PyFlink -->
  <g fill="#DC2626">
    <circle cx="250" cy="228" r="3.5"/>
    <circle cx="402.2" cy="210.6" r="3.5"/>
    <circle cx="344.1" cy="389" r="3.5"/>
    <circle cx="155.9" cy="389" r="3.5"/>
    <circle cx="97.8" cy="210.6" r="3.5"/>
  </g>

  <!-- Data points - Bytewax -->
  <g fill="#059669">
    <circle cx="250" cy="132" r="3.5"/>
    <circle cx="371.7" cy="220.5" r="3.5"/>
    <circle cx="306.5" cy="337.6" r="3.5"/>
    <circle cx="193.5" cy="337.6" r="3.5"/>
    <circle cx="189.1" cy="240.2" r="3.5"/>
  </g>

  <!-- Legend -->
  <rect x="28" y="460" width="440" height="44" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="48" y="474" width="24" height="12" rx="3" fill="#2563EB" fill-opacity="0.6" stroke="#2563EB" stroke-width="1"/>
  <text x="80" y="485" font-size="12" font-weight="600" fill="#1E293B">LiuTang</text>
  <text x="126" y="485" font-size="10" fill="#64748B">(5,4,5,5,5)</text>

  <rect x="188" y="474" width="24" height="12" rx="3" fill="#DC2626" fill-opacity="0.4" stroke="#DC2626" stroke-width="1"/>
  <text x="220" y="485" font-size="12" font-weight="600" fill="#1E293B">PyFlink</text>
  <text x="266" y="485" font-size="10" fill="#64748B">(1,5,5,5,5)</text>

  <rect x="328" y="474" width="24" height="12" rx="3" fill="#059669" fill-opacity="0.4" stroke="#059669" stroke-width="1"/>
  <text x="360" y="485" font-size="12" font-weight="600" fill="#1E293B">Bytewax</text>
  <text x="414" y="485" font-size="10" fill="#64748B">(4,4,3,3,2)</text>
</svg>