<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" width="920" height="260" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowSm" x="-1%" y="-1%" width="102%" height="106%">
      <feDropShadow dx="0" dy="0.5" stdDeviation="1" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="260" rx="12" fill="#F8FAFC"/>
  <rect x="1" y="1" width="918" height="258" rx="12" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">State Primitives</text>

  <!-- ============ ValueState ============ -->
  <g transform="translate(20, 50)">
    <rect width="168" height="195" rx="10" fill="white" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="168" height="28" rx="10" fill="#2563EB"/>
    <rect y="20" width="168" height="8" fill="#2563EB"/>
    <text x="84" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">ValueState</text>

    <!-- Key → Value box -->
    <rect x="16" y="42" width="136" height="50" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <rect x="24" y="50" width="40" height="34" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
    <text x="44" y="72" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">key</text>
    <text x="80" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">→</text>
    <rect x="92" y="50" width="50" height="34" rx="4" fill="white" stroke="#2563EB" stroke-width="1.2"/>
    <text x="117" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#2563EB">val</text>

    <!-- TTL Clock -->
    <rect x="16" y="102" width="136" height="32" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.8"/>
    <text x="32" y="122" font-size="10" fill="#64748B">⏱</text>
    <text x="50" y="122" font-size="10" fill="#64748B">TTL Clock</text>
    <rect x="100" y="108" width="44" height="20" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8"/>
    <text x="122" y="122" text-anchor="middle" font-size="9" font-weight="600" fill="#92400E">TTL</text>

    <!-- Methods -->
    <line x1="16" y1="145" x2="152" y2="145" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="84" y="163" text-anchor="middle" font-size="9" fill="#2563EB">.get() / .set(v)</text>
    <text x="84" y="178" text-anchor="middle" font-size="9" fill="#64748B">Single value per key</text>
  </g>

  <!-- ============ ListState ============ -->
  <g transform="translate(200, 50)">
    <rect width="168" height="195" rx="10" fill="white" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="168" height="28" rx="10" fill="#059669"/>
    <rect y="20" width="168" height="8" fill="#059669"/>
    <text x="84" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">ListState</text>

    <!-- Key → [v1, v2, v3, ...] -->
    <rect x="16" y="42" width="136" height="55" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <rect x="24" y="50" width="34" height="38" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <text x="41" y="74" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">key</text>
    <text x="72" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">→</text>
    <rect x="84" y="48" width="24" height="14" rx="3" fill="white" stroke="#059669" stroke-width="0.8"/>
    <text x="96" y="59" text-anchor="middle" font-size="8" font-weight="600" fill="#059669">v1</text>
    <rect x="112" y="48" width="24" height="14" rx="3" fill="white" stroke="#059669" stroke-width="0.8"/>
    <text x="124" y="59" text-anchor="middle" font-size="8" font-weight="600" fill="#059669">v2</text>
    <rect x="84" y="66" width="24" height="14" rx="3" fill="white" stroke="#059669" stroke-width="0.8"/>
    <text x="96" y="77" text-anchor="middle" font-size="8" font-weight="600" fill="#059669">v3</text>
    <rect x="112" y="66" width="24" height="14" rx="3" fill="white" stroke="#059669" stroke-width="0.8"/>
    <text x="124" y="77" text-anchor="middle" font-size="8" font-weight="600" fill="#059669">...</text>

    <!-- Append arrow -->
    <path d="M140,80 L148,86 L140,92" stroke="#059669" stroke-width="1.5" fill="none"/>
    <line x1="136" y1="86" x2="148" y2="86" stroke="#059669" stroke-width="1.5"/>
    <text x="138" y="102" text-anchor="middle" font-size="7" fill="#059669" font-style="italic">append</text>

    <!-- Methods -->
    <line x1="16" y1="110" x2="152" y2="110" stroke="#A7F3D0" stroke-width="0.5"/>
    <text x="84" y="130" text-anchor="middle" font-size="9" fill="#059669">.add(v) / .get_all()</text>
    <text x="84" y="145" text-anchor="middle" font-size="9" fill="#64748B">Ordered list per key</text>
    <rect x="30" y="155" width="108" height="26" rx="5" fill="#ECFDF5" stroke="#059669" stroke-width="0.8"/>
    <text x="84" y="172" text-anchor="middle" font-size="9" font-weight="500" fill="#047857">append → grows infinitely</text>
  </g>

  <!-- ============ MapState ============ -->
  <g transform="translate(380, 50)">
    <rect width="168" height="195" rx="10" fill="white" stroke="#7C3AED" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="168" height="28" rx="10" fill="#7C3AED"/>
    <rect y="20" width="168" height="8" fill="#7C3AED"/>
    <text x="84" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">MapState</text>

    <!-- Key → {k1:v1, k2:v2} -->
    <rect x="16" y="42" width="136" height="55" rx="6" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
    <rect x="24" y="50" width="34" height="38" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
    <text x="41" y="74" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">key</text>
    <text x="72" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">→</text>

    <!-- Map entries -->
    <rect x="82" y="47" width="62" height="38" rx="4" fill="white" stroke="#7C3AED" stroke-width="0.8"/>
    <text x="90" y="62" font-size="8" fill="#6D28D9">k1:</text>
    <text x="100" y="62" font-size="8" font-weight="600" fill="#7C3AED">v1</text>
    <text x="90" y="78" font-size="8" fill="#6D28D9">k2:</text>
    <text x="100" y="78" font-size="8" font-weight="600" fill="#7C3AED">v2</text>

    <!-- put/get arrows -->
    <path d="M152,55 L160,55" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="156" y="48" font-size="7" fill="#7C3AED" font-style="italic">put</text>
    <path d="M152,70 L160,70" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="156" y="83" font-size="7" fill="#7C3AED" font-style="italic">get</text>

    <!-- Methods -->
    <line x1="16" y1="110" x2="152" y2="110" stroke="#C4B5FD" stroke-width="0.5"/>
    <text x="84" y="130" text-anchor="middle" font-size="9" fill="#7C3AED">.put(k, v) / .get(k)</text>
    <text x="84" y="145" text-anchor="middle" font-size="9" fill="#64748B">Key-value map per key</text>
    <rect x="30" y="155" width="108" height="26" rx="5" fill="#F5F3FF" stroke="#7C3AED" stroke-width="0.8"/>
    <text x="84" y="172" text-anchor="middle" font-size="9" font-weight="500" fill="#6D28D9">put / get → O(1) lookup</text>
  </g>

  <!-- ============ ReducingState ============ -->
  <g transform="translate(560, 50)">
    <rect width="168" height="195" rx="10" fill="white" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="168" height="28" rx="10" fill="#D97706"/>
    <rect y="20" width="168" height="8" fill="#D97706"/>
    <text x="84" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">ReducingState</text>

    <!-- Key → reduce(v1,v2,...) -->
    <rect x="16" y="42" width="136" height="55" rx="6" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
    <rect x="24" y="50" width="34" height="38" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
    <text x="41" y="74" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">key</text>
    <text x="72" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">→</text>

    <!-- Reduce symbol -->
    <rect x="84" y="47" width="56" height="38" rx="6" fill="white" stroke="#D97706" stroke-width="1.2"/>
    <text x="112" y="66" text-anchor="middle" font-size="16" font-weight="700" fill="#D97706">σ</text>
    <text x="112" y="80" text-anchor="middle" font-size="7" fill="#92400E">reduce</text>

    <!-- Methods -->
    <line x1="16" y1="110" x2="152" y2="110" stroke="#FDE68A" stroke-width="0.5"/>
    <text x="84" y="130" text-anchor="middle" font-size="9" fill="#D97706">.add(v) → reduce(v, cur)</text>
    <text x="84" y="145" text-anchor="middle" font-size="9" fill="#64748B">Reduce function per key</text>
    <rect x="30" y="155" width="108" height="26" rx="5" fill="#FFF7ED" stroke="#D97706" stroke-width="0.8"/>
    <text x="84" y="172" text-anchor="middle" font-size="9" font-weight="500" fill="#92400E">σ = reduce(v1, v2, ...)</text>
  </g>

  <!-- ============ AggregatingState ============ -->
  <g transform="translate(740, 50)">
    <rect width="168" height="195" rx="10" fill="white" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="168" height="28" rx="10" fill="#DC2626"/>
    <rect y="20" width="168" height="8" fill="#DC2626"/>
    <text x="84" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">AggregatingState</text>

    <!-- Key → accum(init, add) -->
    <rect x="16" y="42" width="136" height="55" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <rect x="24" y="50" width="34" height="38" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <text x="41" y="74" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">key</text>
    <text x="72" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">→</text>

    <!-- Accumulator symbol -->
    <rect x="84" y="47" width="56" height="38" rx="6" fill="white" stroke="#DC2626" stroke-width="1.2"/>
    <text x="112" y="64" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">Σ</text>
    <text x="112" y="80" text-anchor="middle" font-size="7" fill="#991B1B">accum</text>

    <!-- Accumulator detail -->
    <path d="M90,94 C95,94 95,94 100,94" stroke="#DC2626" stroke-width="0.8" fill="none"/>
    <text x="112" y="94" text-anchor="middle" font-size="7" fill="#DC2626" font-style="italic">init + add</text>

    <!-- Methods -->
    <line x1="16" y1="110" x2="152" y2="110" stroke="#FECACA" stroke-width="0.5"/>
    <text x="84" y="130" text-anchor="middle" font-size="9" fill="#DC2626">.add(v) → accum(add, acc)</text>
    <text x="84" y="145" text-anchor="middle" font-size="9" fill="#64748B">Accumulator per key</text>
    <rect x="30" y="155" width="108" height="26" rx="5" fill="#FEF2F2" stroke="#DC2626" stroke-width="0.8"/>
    <text x="84" y="172" text-anchor="middle" font-size="9" font-weight="500" fill="#991B1B">accum(init, v1+v2+...)</text>
  </g>
</svg>