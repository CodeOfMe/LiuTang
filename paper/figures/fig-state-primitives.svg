<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 320" width="1100" height="320" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="320" rx="12" fill="#F8FAFC"/>
  <rect x="1" y="1" width="1098" height="318" rx="12" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="550" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">State Primitives with Optional TTL</text>

  <!-- ============ ValueState ============ -->
  <g transform="translate(15, 42)">
    <rect width="200" height="268" rx="10" fill="white" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
    <rect width="200" height="28" rx="10" fill="#2563EB"/>
    <rect y="20" width="200" height="8" fill="#2563EB"/>
    <text x="100" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="white">ValueState</text>

    <!-- key -> value -->
    <rect x="14" y="40" width="172" height="48" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <rect x="24" y="50" width="44" height="28" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
    <text x="46" y="69" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">key</text>
    <text x="82" y="69" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">&#x2192;</text>
    <rect x="96" y="50" width="52" height="28" rx="5" fill="white" stroke="#2563EB" stroke-width="1.5"/>
    <text x="122" y="69" text-anchor="middle" font-size="13" font-weight="700" fill="#2563EB">val</text>

    <!-- TTL indicator -->
    <rect x="14" y="100" width="172" height="28" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.8"/>
    <circle cx="28" cy="114" r="6" fill="none" stroke="#64748B" stroke-width="1.2"/>
    <line x1="28" y1="108" x2="28" y2="114" stroke="#64748B" stroke-width="1"/>
    <line x1="28" y1="114" x2="31" y2="117" stroke="#64748B" stroke-width="1"/>
    <line x1="28" y1="107" x2="28" y2="108" stroke="#64748B" stroke-width="0.8"/>
    <text x="40" y="118" font-size="11" fill="#64748B">TTL Clock</text>
    <rect x="140" y="103" width="40" height="22" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="160" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">TTL</text>

    <!-- Methods -->
    <line x1="14" y1="138" x2="186" y2="138" stroke="#E2E8F0" stroke-width="1"/>
    <text x="100" y="158" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="600">.get() / .set(v)</text>
    <text x="100" y="176" text-anchor="middle" font-size="10" fill="#64748B">Single value per key</text>

    <!-- TTL expiry -->
    <rect x="14" y="192" width="172" height="58" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="100" y="212" text-anchor="middle" font-size="10" fill="#991B1B">monotonic() - last_access</text>
    <text x="100" y="228" text-anchor="middle" font-size="10" fill="#991B1B">&gt; TTL ? clear : keep</text>
    <text x="100" y="244" text-anchor="middle" font-size="9" fill="#94A3B8" font-style="italic">auto-expiry on access</text>
  </g>

  <!-- ============ ListState ============ -->
  <g transform="translate(225, 42)">
    <rect width="200" height="268" rx="10" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
    <rect width="200" height="28" rx="10" fill="#059669"/>
    <rect y="20" width="200" height="8" fill="#059669"/>
    <text x="100" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="white">ListState</text>

    <!-- key -> [v1, v2, v3, ...] -->
    <rect x="14" y="40" width="172" height="48" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <rect x="24" y="50" width="34" height="28" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
    <text x="41" y="69" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">key</text>
    <text x="72" y="69" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">&#x2192;</text>
    <rect x="86" y="50" width="28" height="20" rx="4" fill="white" stroke="#059669" stroke-width="1"/>
    <text x="100" y="64" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">v1</text>
    <rect x="118" y="50" width="28" height="20" rx="4" fill="white" stroke="#059669" stroke-width="1"/>
    <text x="132" y="64" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">v2</text>
    <rect x="150" y="50" width="28" height="20" rx="4" fill="white" stroke="#059669" stroke-width="1"/>
    <text x="164" y="64" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">v3</text>
    <rect x="86" y="72" width="92" height="14" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="0.6"/>
    <text x="132" y="83" text-anchor="middle" font-size="8" fill="#059669" font-style="italic">append-only</text>

    <!-- TTL indicator -->
    <rect x="14" y="100" width="172" height="28" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.8"/>
    <circle cx="28" cy="114" r="6" fill="none" stroke="#64748B" stroke-width="1.2"/>
    <line x1="28" y1="108" x2="28" y2="114" stroke="#64748B" stroke-width="1"/>
    <line x1="28" y1="114" x2="31" y2="117" stroke="#64748B" stroke-width="1"/>
    <line x1="28" y1="107" x2="28" y2="108" stroke="#64748B" stroke-width="0.8"/>
    <text x="40" y="118" font-size="11" fill="#64748B">TTL Clock</text>
    <rect x="140" y="103" width="40" height="22" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="160" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">TTL</text>

    <!-- Methods -->
    <line x1="14" y1="138" x2="186" y2="138" stroke="#A7F3D0" stroke-width="1"/>
    <text x="100" y="158" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">.add(v) / .get_all()</text>
    <text x="100" y="176" text-anchor="middle" font-size="10" fill="#64748B">Ordered list per key</text>

    <!-- Note -->
    <rect x="14" y="192" width="172" height="58" rx="6" fill="#F0FDF4" stroke="#A7F3D0" stroke-width="1"/>
    <text x="100" y="212" text-anchor="middle" font-size="10" fill="#047857">append(v) adds to end</text>
    <text x="100" y="228" text-anchor="middle" font-size="10" fill="#047857">get_all() returns order</text>
    <text x="100" y="244" text-anchor="middle" font-size="9" fill="#94A3B8" font-style="italic">FIFO growth</text>
  </g>

  <!-- ============ MapState ============ -->
  <g transform="translate(435, 42)">
    <rect width="200" height="268" rx="10" fill="white" stroke="#7C3AED" stroke-width="2" filter="url(#shadow)"/>
    <rect width="200" height="28" rx="10" fill="#7C3AED"/>
    <rect y="20" width="200" height="8" fill="#7C3AED"/>
    <text x="100" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="white">MapState</text>

    <!-- key -> {k1:v1, k2:v2, ...} -->
    <rect x="14" y="40" width="172" height="48" rx="6" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
    <rect x="24" y="50" width="34" height="28" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
    <text x="41" y="69" text-anchor="middle" font-size="11" font-weight="600" fill="#6D28D9">key</text>
    <text x="72" y="69" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">&#x2192;</text>
    <rect x="86" y="50" width="88" height="28" rx="5" fill="white" stroke="#7C3AED" stroke-width="0.8"/>
    <text x="96" y="67" font-size="10" fill="#6D28D9">k1:</text>
    <text x="112" y="67" font-size="10" font-weight="600" fill="#7C3AED">v1</text>
    <text x="130" y="67" font-size="10" fill="#6D28D9">k2:</text>
    <text x="146" y="67" font-size="10" font-weight="600" fill="#7C3AED">v2</text>

    <!-- TTL indicator -->
    <rect x="14" y="100" width="172" height="28" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.8"/>
    <circle cx="28" cy="114" r="6" fill="none" stroke="#64748B" stroke-width="1.2"/>
    <line x1="28" y1="108" x2="28" y2="114" stroke="#64748B" stroke-width="1"/>
    <line x1="28" y1="114" x2="31" y2="117" stroke="#64748B" stroke-width="1"/>
    <line x1="28" y1="107" x2="28" y2="108" stroke="#64748B" stroke-width="0.8"/>
    <text x="40" y="118" font-size="11" fill="#64748B">TTL Clock</text>
    <rect x="140" y="103" width="40" height="22" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="160" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">TTL</text>

    <!-- Methods -->
    <line x1="14" y1="138" x2="186" y2="138" stroke="#C4B5FD" stroke-width="1"/>
    <text x="100" y="158" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="600">.put(k, v) / .get(k)</text>
    <text x="100" y="176" text-anchor="middle" font-size="10" fill="#64748B">Key-value map per key</text>

    <!-- Note -->
    <rect x="14" y="192" width="172" height="58" rx="6" fill="#FAF5FF" stroke="#C4B5FD" stroke-width="1"/>
    <text x="100" y="212" text-anchor="middle" font-size="10" fill="#6D28D9">put(k, v) overwrites existing</text>
    <text x="100" y="228" text-anchor="middle" font-size="10" fill="#6D28D9">get(k) returns value or None</text>
    <text x="100" y="244" text-anchor="middle" font-size="9" fill="#94A3B8" font-style="italic">O(1) lookup</text>
  </g>

  <!-- ============ ReducingState ============ -->
  <g transform="translate(645, 42)">
    <rect width="200" height="268" rx="10" fill="white" stroke="#D97706" stroke-width="2" filter="url(#shadow)"/>
    <rect width="200" height="28" rx="10" fill="#D97706"/>
    <rect y="20" width="200" height="8" fill="#D97706"/>
    <text x="100" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="white">ReducingState</text>

    <!-- key -> sum (reduce) -->
    <rect x="14" y="40" width="172" height="48" rx="6" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
    <rect x="24" y="50" width="34" height="28" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
    <text x="41" y="69" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">key</text>
    <text x="72" y="69" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">&#x2192;</text>
    <rect x="86" y="50" width="88" height="28" rx="5" fill="white" stroke="#D97706" stroke-width="1.2"/>
    <text x="130" y="68" text-anchor="middle" font-size="18" font-weight="700" fill="#D97706">&#x03A3;</text>
    <text x="130" y="82" text-anchor="middle" font-size="8" fill="#92400E" font-style="italic">reduce</text>

    <!-- TTL indicator -->
    <rect x="14" y="100" width="172" height="28" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.8"/>
    <circle cx="28" cy="114" r="6" fill="none" stroke="#64748B" stroke-width="1.2"/>
    <line x1="28" y1="108" x2="28" y2="114" stroke="#64748B" stroke-width="1"/>
    <line x1="28" y1="114" x2="31" y2="117" stroke="#64748B" stroke-width="1"/>
    <line x1="28" y1="107" x2="28" y2="108" stroke="#64748B" stroke-width="0.8"/>
    <text x="40" y="118" font-size="11" fill="#64748B">TTL Clock</text>
    <rect x="140" y="103" width="40" height="22" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="160" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">TTL</text>

    <!-- Methods -->
    <line x1="14" y1="138" x2="186" y2="138" stroke="#FDE68A" stroke-width="1"/>
    <text x="100" y="158" text-anchor="middle" font-size="11" fill="#D97706" font-weight="600">.add(v) &#x2192; reduce(v, cur)</text>
    <text x="100" y="176" text-anchor="middle" font-size="10" fill="#64748B">Reduce function per key</text>

    <!-- Note -->
    <rect x="14" y="192" width="172" height="58" rx="6" fill="#FFFBEB" stroke="#FED7AA" stroke-width="1"/>
    <text x="100" y="212" text-anchor="middle" font-size="10" fill="#92400E">add(v) applies reduce_fn:</text>
    <text x="100" y="228" text-anchor="middle" font-size="10" fill="#92400E">new_state = reduce(v, old)</text>
    <text x="100" y="244" text-anchor="middle" font-size="9" fill="#94A3B8" font-style="italic">e.g. sum, min, max</text>
  </g>

  <!-- ============ AggregatingState ============ -->
  <g transform="translate(855, 42)">
    <rect width="200" height="268" rx="10" fill="white" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
    <rect width="200" height="28" rx="10" fill="#DC2626"/>
    <rect y="20" width="200" height="8" fill="#DC2626"/>
    <text x="100" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="white">AggregatingState</text>

    <!-- key -> ACCUM(init, add) -->
    <rect x="14" y="40" width="172" height="48" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <rect x="24" y="50" width="34" height="28" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <text x="41" y="69" text-anchor="middle" font-size="11" font-weight="600" fill="#991B1B">key</text>
    <text x="72" y="69" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">&#x2192;</text>
    <rect x="86" y="50" width="88" height="28" rx="5" fill="white" stroke="#DC2626" stroke-width="1.2"/>
    <text x="130" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">init + add</text>

    <!-- TTL indicator -->
    <rect x="14" y="100" width="172" height="28" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.8"/>
    <circle cx="28" cy="114" r="6" fill="none" stroke="#64748B" stroke-width="1.2"/>
    <line x1="28" y1="108" x2="28" y2="114" stroke="#64748B" stroke-width="1"/>
    <line x1="28" y1="114" x2="31" y2="117" stroke="#64748B" stroke-width="1"/>
    <line x1="28" y1="107" x2="28" y2="108" stroke="#64748B" stroke-width="0.8"/>
    <text x="40" y="118" font-size="11" fill="#64748B">TTL Clock</text>
    <rect x="140" y="103" width="40" height="22" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="160" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">TTL</text>

    <!-- Methods -->
    <line x1="14" y1="138" x2="186" y2="138" stroke="#FECACA" stroke-width="1"/>
    <text x="100" y="158" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="600">.add(v) &#x2192; accum(add, acc)</text>
    <text x="100" y="176" text-anchor="middle" font-size="10" fill="#64748B">Accumulator per key</text>

    <!-- Note -->
    <rect x="14" y="192" width="172" height="58" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <text x="100" y="212" text-anchor="middle" font-size="10" fill="#991B1B">add(v) applies add_fn:</text>
    <text x="100" y="228" text-anchor="middle" font-size="10" fill="#991B1B">new_acc = add_fn(v, acc)</text>
    <text x="100" y="244" text-anchor="middle" font-size="9" fill="#94A3B8" font-style="italic">e.g. avg, count, concat</text>
  </g>
</svg>